name: Build and Test (.NET 8)

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CashFlowBot.sln

      - name: Build solution
        run: dotnet build CashFlowBot.sln --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test CashFlowBot/CashFlowBot.csproj --configuration Release --no-build --verbosity minimal

      - name: Build Bot Emulator
        run: dotnet publish CashFlowBotEmulator/CashFlowBotEmulator.csproj -c Release -o ./emulator -r linux-x64 --self-contained true

      - name: Run Bot Emulator
        run: |
          chmod +x artifacts/emulator/CashFlowBotEmulator
          ./artifacts/emulator/CashFlowBotEmulator &

      - name: System Tests
        working-directory: ./emulator
        run: dotnet test ../../CashFlowBotTests/CashFlowBotTests.csproj \
          --configuration Release \
          --no-build \
          --verbosity minimal
