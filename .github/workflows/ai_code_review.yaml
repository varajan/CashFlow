name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get diff (limited)
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt
          head -c 20000 diff.txt > diff_small.txt

      - name: Call OpenAI
        id: ai
        run: |
          set -e

          cat > prompt.txt <<'EOF'
You are a senior C# reviewer.

Analyze the following git diff.

Return JSON in this format:
{
  "summary": "short overall review",
  "comments": [
    {
      "file": "path/file.cs",
      "line": 123,
      "comment": "text"
    }
  ]
}

Rules:
- Focus on bugs, null issues, async issues
- Detect hardcoded strings (suggest using translation keys)
- Detect missing localization patterns
- Suggest improvements
- Be concise
- Max 10 comments
EOF

          RESPONSE=$(curl https://api.openai.com/v1/responses \
            -s \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
{
  "model": "gpt-4.1-mini",
  "input": "$(cat prompt.txt)\n\n$(cat diff_small.txt)"
}
EOF
)

          echo "$RESPONSE" > response.json

          echo "$RESPONSE" | jq -r '.output[0].content[0].text' > ai_result.json

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let data;
            try {
              data = JSON.parse(fs.readFileSync('ai_result.json', 'utf8'));
            } catch (e) {
              console.log("Failed to parse AI response");
              return;
            }

            const summary = data.summary || "No summary";
            const comments = data.comments || [];

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 AI Review:\n\n" + summary
            });

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            for (const c of comments) {
              if (!c.file || !c.line || !c.comment) continue;

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: c.comment,
                  commit_id: pr.data.head.sha,
                  path: c.file,
                  line: c.line,
                  side: "RIGHT"
                });
              } catch (e) {
                console.log("Failed to comment:", c);
              }
            }
