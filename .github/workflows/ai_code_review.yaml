name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (limited)
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt
          head -c 20000 diff.txt > diff_small.txt

      - name: Build prompt
        run: |
          cat > prompt.txt <<'EOF'
          You are a senior C# reviewer.
          
          Analyze the following git diff.
          
          Return STRICT JSON ONLY (no markdown, no code fences):
          
          {
            "summary": "short overall review",
            "comments": [
              {
                "file": "path/file.cs",
                "line": 123,
                "comment": "text"
              }
            ]
          }
          
          Rules:
          - Focus on bugs, null issues, async issues
          - Detect hardcoded strings
          - Detect missing localization patterns
          - Suggest improvements
          - Max 10 comments
          EOF

      - name: Call OpenAI
        run: |
          set -e

          jq -n \
            --arg prompt "$(cat prompt.txt)" \
            --arg diff "$(cat diff_small.txt)" \
            '{
              model: "gpt-4.1-mini",
              input: ($prompt + "\n\nDIFF:\n" + $diff)
            }' > request.json

          curl https://api.openai.com/v1/responses \
            -s \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            --data @request.json > response.json

      - name: Extract AI result safely
        run: |
          jq -r '.output[0].content[0].text // empty' response.json \
            | sed 's/```json//g' \
            | sed 's/```//g' \
            > ai_result.json

          # якщо пусто — не падаємо, але створюємо fallback
          if [ ! -s ai_result.json ]; then
            echo '{"summary":"No valid AI response","comments":[]}' > ai_result.json
          fi

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let raw = fs.readFileSync('ai_result.json', 'utf8');

            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.log("Invalid JSON from AI, fallback used");
              data = { summary: "AI returned invalid JSON", comments: [] };
            }

            const summary = data.summary ?? "No summary";
            const comments = Array.isArray(data.comments) ? data.comments : [];

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 AI Review:\n\n" + summary
            });

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            for (const c of comments) {
              if (!c?.file || !c?.line || !c?.comment) continue;

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: c.comment,
                  commit_id: pr.data.head.sha,
                  path: c.file,
                  line: c.line,
                  side: "RIGHT"
                });
              } catch (e) {
                console.log("Failed to comment:", c);
              }
            }