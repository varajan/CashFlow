name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (limited)
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt
          head -c 20000 diff.txt > diff_small.txt

      - name: Build prompt
        run: |
          cat > prompt.txt <<'EOF'
          You are a senior C# reviewer.
          
          Analyze the following git diff.
          
          Return STRICT JSON ONLY (no markdown, no code fences):
          {
            "summary": "short overall review",
            "comments": [
              {
                "file": "path/file.cs",
                "line": 123,
                "comment": "text"
              }
            ]
          }
          
          Rules:
          - Focus on bugs, null issues, async issues
          - Detect hardcoded strings
          - Detect missing localization patterns
          - Suggest improvements
          - Max 10 comments
          EOF

      - name: Call OpenAI (with fallback model)
        run: |
          set -e

          request() {
            MODEL=$1
            curl https://api.openai.com/v1/responses \
              -s \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d @- <<EOF
            {
            "model": "$MODEL",
            "input": "$(cat prompt.txt)\n\nDIFF:\n$(cat diff_small.txt)"
            }
            EOF
        }

          echo "Calling primary model gpt-4.1-mini..."
          request "gpt-4.1-mini" > response1.json

          ERR_CODE=$(jq -r '.error.code // empty' response1.json)

          if [ "$ERR_CODE" = "insufficient_quota" ]; then
            echo "Primary quota exceeded, switching to fallback model gpt-4o-mini..."
            request "gpt-4o-mini" > response.json
          else
            cp response1.json response.json
          fi

      - name: Extract AI result safely
        run: |
          set -e

          jq -r '.output[0].content[0].text // empty' response.json \
            | sed 's/```json//g' \
            | sed 's/```//g' \
            > ai_result.json

          if [ ! -s ai_result.json ]; then
            echo '{"quota_error":true}' > ai_result.json
          fi

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let raw = fs.readFileSync('ai_result.json', 'utf8');
            let data;

            try {
              data = JSON.parse(raw);
            } catch (e) {
              data = null;
            }

            if (data?.quota_error === true) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "I'm tired for today, let's check tomorrow."
              });
              return;
            }

            const summary = data?.summary ?? "No summary";
            const comments = Array.isArray(data?.comments) ? data.comments : [];

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 AI Review:\n\n" + summary
            });

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            for (const c of comments) {
              if (!c?.file || !c?.line || !c?.comment) continue;

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: c.comment,
                  commit_id: pr.data.head.sha,
                  path: c.file,
                  line: c.line,
                  side: "RIGHT"
                });
              } catch (e) {
                console.log("Failed to comment:", c);
              }
            }

      - name: Save AI artifacts
        run: |
          mkdir -p ai-output
          cp response.json ai-output/response.json || true
          cp ai_result.json ai-output/ai_result.json || true
          cp diff_small.txt ai-output/diff.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-review-${{ github.run_number }}
          path: ai-output/
          retention-days: 7
