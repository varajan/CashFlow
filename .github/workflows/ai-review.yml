name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Call OpenAI
        id: ai
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/responses \
            -s \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "gpt-4.1-mini",
            "input": "You are a senior C# reviewer. Review this PR diff and give concise actionable feedback. Focus on bugs, bad practices, missing translations, and improvements.\n\n$(cat diff.txt)"
          }
          EOF
          )

          echo "$RESPONSE" > response.json

          COMMENT=$(jq -r '.output[0].content[0].text' response.json)

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `${{ steps.ai.outputs.comment }}`;

            if (comment && comment.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "🤖 AI Review:\n\n" + comment
              });
            }