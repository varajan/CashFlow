name: AI Code Review (Gemini)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_URL: https://generativelanguage.googleapis.com/v1beta/models
      DIFF_MAX_BYTES: 30000
      MAX_RETRIES: 5
      BACKOFF_BASE_SECONDS: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt
          head -c $DIFF_MAX_BYTES diff.txt > diff_small.txt

      - name: Call Gemini
        run: bash .github/scripts/call-gemini.sh

      - name: Extract result
        run: bash .github/scripts/extract-result.sh

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./.github/scripts/post-review.js');
            await run({ github, context });

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: .
